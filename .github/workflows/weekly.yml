name: Weekly edition (Sundays)

on:
  schedule:
    # Sundays 14:05 UTC = 7:05 AM PDT, an hour after the daily
    - cron: "5 14 * * 0"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Log run start
        run: |
          echo "=== Weekly edition run starting ==="
          echo "Triggered by: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}  Commit: ${{ github.sha }}"
          echo "Started at (UTC): $(date -u +"%Y-%m-%d %H:%M:%S")"

      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: |
          echo "Python: $(python --version)"
          pip install -r pipeline/requirements.txt
          echo "Dependencies installed."

      - name: Verify repository secrets
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          echo "Checking required repository secrets..."
          missing=()
          for name in GEMINI_API_KEY SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY RESEND_API_KEY EMAIL_TO; do
            value="${!name}"
            if [ -z "$value" ]; then
              missing+=("$name")
              echo "  [MISSING] $name"
            else
              echo "  [ok] $name (${#value} chars set)"
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Repository secrets missing or empty: ${missing[*]}"
            echo "Add them at: Settings -> Secrets and variables -> Actions -> Repository secrets"
            echo "Local pipeline/.env is NOT uploaded to GitHub and is NOT used by Actions."
            exit 1
          fi
          echo "Required repository secrets are present."

      - name: Build and send weekly edition
        working-directory: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          WEB_APP_URL: ${{ secrets.WEB_APP_URL }}
          PYTHONUNBUFFERED: "1"
        run: |
          echo "Running: python -m magnolia.run --kind weekly"
          python -m magnolia.run --kind weekly

      - name: Log run result
        if: always()
        run: |
          echo "=== Weekly edition run finished ==="
          echo "Finished at (UTC): $(date -u +"%Y-%m-%d %H:%M:%S")"
          if [ "${{ job.status }}" = "success" ]; then
            echo "Result: SUCCESS"
          else
            echo "Result: FAILED (job status: ${{ job.status }})"
          fi
          {
            echo "### Weekly edition — ${{ job.status }}"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Triggered by: ${{ github.event_name }}"
            echo "- Finished at (UTC): $(date -u +"%Y-%m-%d %H:%M:%S")"
          } >> "$GITHUB_STEP_SUMMARY"
