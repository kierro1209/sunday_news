name: Daily edition

on:
  schedule:
    # 13:05 UTC = 6:05 AM PDT (5:05 AM PST in winter)
    - cron: "5 13 * * *"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Verify repository secrets
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          missing=()
          for name in GEMINI_API_KEY SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY RESEND_API_KEY EMAIL_TO; do
            if [ -z "${!name}" ]; then missing+=("$name"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Repository secrets missing or empty: ${missing[*]}"
            echo "Add them at: Settings -> Secrets and variables -> Actions -> Repository secrets"
            echo "Local pipeline/.env is NOT uploaded to GitHub and is NOT used by Actions."
            exit 1
          fi
          echo "Required repository secrets are present."
      - name: Build and send daily edition
        working-directory: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          WEB_APP_URL: ${{ secrets.WEB_APP_URL }}
          PYTHONUNBUFFERED: "1"
        run: |
          # Strip all secrets at shell level before Python sees them
          export GEMINI_API_KEY=$(echo -n "$GEMINI_API_KEY" | tr -d '\r\n\0')
          export SUPABASE_URL=$(echo -n "$SUPABASE_URL" | tr -d '\r\n\0')
          export SUPABASE_SERVICE_ROLE_KEY=$(echo -n "$SUPABASE_SERVICE_ROLE_KEY" | tr -d '\r\n\0')
          export RESEND_API_KEY=$(echo -n "$RESEND_API_KEY" | tr -d '\r\n\0')
          export EMAIL_TO=$(echo -n "$EMAIL_TO" | tr -d '\r\n\0')
          export EMAIL_FROM=$(echo -n "$EMAIL_FROM" | tr -d '\r\n\0')
          export WEB_APP_URL=$(echo -n "$WEB_APP_URL" | tr -d '\r\n\0')
          python -m magnolia.run --kind daily
