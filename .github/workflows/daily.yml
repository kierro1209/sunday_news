name: Daily edition

on:
  schedule:
    # 13:05 UTC = 6:05 AM PDT (5:05 AM PST in winter)
    - cron: "5 13 * * *"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Verify repository secrets
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          missing=()
          for name in GEMINI_API_KEY SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY RESEND_API_KEY EMAIL_TO; do
            if [ -z "${!name}" ]; then missing+=("$name"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Repository secrets missing or empty: ${missing[*]}"
            echo "Add them at: Settings -> Secrets and variables -> Actions -> Repository secrets"
            echo "Local pipeline/.env is NOT uploaded to GitHub and is NOT used by Actions."
            exit 1
          fi
          echo "Required repository secrets are present."
      - name: Build and send daily edition
        working-directory: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          WEB_APP_URL: ${{ secrets.WEB_APP_URL }}
        run: |
          echo "Env vars set (non-empty = has value, empty = no value or only whitespace):"
          echo "  GEMINI_API_KEY: $([ -n '${{ secrets.GEMINI_API_KEY }}' ] && echo 'set' || echo 'EMPTY')"
          echo "  SUPABASE_URL: $([ -n '${{ secrets.SUPABASE_URL }}' ] && echo 'set' || echo 'EMPTY')"
          echo "  SUPABASE_SERVICE_ROLE_KEY: $([ -n '${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' ] && echo 'set' || echo 'EMPTY')"
          echo "  RESEND_API_KEY: $([ -n '${{ secrets.RESEND_API_KEY }}' ] && echo 'set' || echo 'EMPTY')"
          echo "  EMAIL_TO: $([ -n '${{ secrets.EMAIL_TO }}' ] && echo 'set' || echo 'EMPTY')"
          python -m magnolia.run --kind daily
